<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.25"/>
    </filter>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#94a3b8"/></marker>
  </defs>

  <rect width="1000" height="420" fill="url(#bg)" rx="10"/>
  <text x="500" y="38" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">Kafka → Flink → ClickHouse 전체 흐름</text>

  <!-- 1. 데이터 생성 -->
  <g filter="url(#sh)">
    <rect x="30" y="80" width="150" height="260" rx="10" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="105" y="110" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">데이터 생성</text>
    <rect x="50" y="130" width="110" height="36" rx="6" fill="#10b981" opacity="0.85"/>
    <text x="105" y="153" text-anchor="middle" fill="#fff" font-size="10">웹/앱 이벤트</text>
    <rect x="50" y="178" width="110" height="36" rx="6" fill="#10b981" opacity="0.85"/>
    <text x="105" y="201" text-anchor="middle" fill="#fff" font-size="10">IoT 센서</text>
    <rect x="50" y="226" width="110" height="36" rx="6" fill="#10b981" opacity="0.85"/>
    <text x="105" y="249" text-anchor="middle" fill="#fff" font-size="10">로그/DB 변경</text>
    <text x="105" y="290" text-anchor="middle" fill="#64748b" font-size="9">수만~수십만 건/초</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="180" y1="210" x2="240" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 2. Kafka -->
  <g filter="url(#sh)">
    <rect x="250" y="80" width="170" height="260" rx="10" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="335" y="108" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Apache Kafka</text>
    <text x="335" y="126" text-anchor="middle" fill="#bfdbfe" font-size="9">이벤트 스트리밍</text>
    <rect x="270" y="142" width="130" height="30" rx="5" fill="#1e3a8a" opacity="0.7"/>
    <text x="335" y="162" text-anchor="middle" fill="#e0f2fe" font-size="9">메시지 수집</text>
    <rect x="270" y="180" width="130" height="30" rx="5" fill="#1e3a8a" opacity="0.7"/>
    <text x="335" y="200" text-anchor="middle" fill="#e0f2fe" font-size="9">파티셔닝</text>
    <rect x="270" y="218" width="130" height="30" rx="5" fill="#1e3a8a" opacity="0.7"/>
    <text x="335" y="238" text-anchor="middle" fill="#e0f2fe" font-size="9">버퍼링</text>
    <rect x="270" y="256" width="130" height="30" rx="5" fill="#1e3a8a" opacity="0.7"/>
    <text x="335" y="276" text-anchor="middle" fill="#e0f2fe" font-size="9">내구성 보장</text>
    <text x="335" y="310" text-anchor="middle" fill="#93c5fd" font-size="9">피크 트래픽 흡수</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="420" y1="210" x2="480" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 3. Flink -->
  <g filter="url(#sh)">
    <rect x="490" y="80" width="170" height="260" rx="10" fill="#9a3412" stroke="#f97316" stroke-width="1.5"/>
    <text x="575" y="108" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Apache Flink</text>
    <text x="575" y="126" text-anchor="middle" fill="#fed7aa" font-size="9">스트림 처리 엔진</text>
    <rect x="510" y="142" width="130" height="30" rx="5" fill="#7c2d12" opacity="0.7"/>
    <text x="575" y="162" text-anchor="middle" fill="#fff7ed" font-size="9">실시간 변환</text>
    <rect x="510" y="180" width="130" height="30" rx="5" fill="#7c2d12" opacity="0.7"/>
    <text x="575" y="200" text-anchor="middle" fill="#fff7ed" font-size="9">집계/집약</text>
    <rect x="510" y="218" width="130" height="30" rx="5" fill="#7c2d12" opacity="0.7"/>
    <text x="575" y="238" text-anchor="middle" fill="#fff7ed" font-size="9">상태 관리</text>
    <rect x="510" y="256" width="130" height="30" rx="5" fill="#7c2d12" opacity="0.7"/>
    <text x="575" y="276" text-anchor="middle" fill="#fff7ed" font-size="9">이벤트 시간 처리</text>
    <text x="575" y="310" text-anchor="middle" fill="#fdba74" font-size="9">데이터 정확성 보장</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="660" y1="210" x2="720" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 4. ClickHouse -->
  <g filter="url(#sh)">
    <rect x="730" y="80" width="170" height="260" rx="10" fill="#854d0e" stroke="#eab308" stroke-width="1.5"/>
    <text x="815" y="108" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">ClickHouse</text>
    <text x="815" y="126" text-anchor="middle" fill="#fef08a" font-size="9">컬럼형 OLAP DB</text>
    <rect x="750" y="142" width="130" height="30" rx="5" fill="#713f12" opacity="0.7"/>
    <text x="815" y="162" text-anchor="middle" fill="#fefce8" font-size="9">고속 저장</text>
    <rect x="750" y="180" width="130" height="30" rx="5" fill="#713f12" opacity="0.7"/>
    <text x="815" y="200" text-anchor="middle" fill="#fefce8" font-size="9">압축 저장</text>
    <rect x="750" y="218" width="130" height="30" rx="5" fill="#713f12" opacity="0.7"/>
    <text x="815" y="238" text-anchor="middle" fill="#fefce8" font-size="9">병렬 쿼리</text>
    <rect x="750" y="256" width="130" height="30" rx="5" fill="#713f12" opacity="0.7"/>
    <text x="815" y="276" text-anchor="middle" fill="#fefce8" font-size="9">SQL 분석</text>
    <text x="815" y="310" text-anchor="middle" fill="#fde047" font-size="9">실시간 대시보드 지원</text>
  </g>

  <!-- Bottom: 역할 요약 -->
  <rect x="30" y="365" width="870" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="50" y="378" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="65" y="388" fill="#94a3b8" font-size="9">생성</text>
  <rect x="110" y="378" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="125" y="388" fill="#94a3b8" font-size="9">수집/버퍼</text>
  <rect x="200" y="378" width="10" height="10" rx="2" fill="#ea580c"/>
  <text x="215" y="388" fill="#94a3b8" font-size="9">처리</text>
  <rect x="260" y="378" width="10" height="10" rx="2" fill="#ca8a04"/>
  <text x="275" y="388" fill="#94a3b8" font-size="9">저장/분석</text>
  <text x="500" y="388" text-anchor="middle" fill="#64748b" font-size="9">각 컴포넌트가 하나의 역할에 전문화 — 결합 시 시너지 극대화</text>
</svg>